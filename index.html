<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>BARYTAN</title>
</head>
<body style="font-family:Arial; max-width:800px; margin:40px auto;">

<h1>BARYTAN Demo</h1>

<p>Server:</p>
<input id="url" style="width:100%" 
value="https://barytan-api.taissiyayena.workers.dev">

<br><br>

<button onclick="ping()">Ping Server</button>
<br><br>
<textarea id="inputText" style="width:100%;height:120px;"
placeholder="Введите текст консультации..."></textarea>

<br><br>
<button onclick="extractText()">Run Extract</button>
<pre id="out"></pre>

<script>
async function ping(){
  const base = document.getElementById("url").value;
  const r = await fetch(base + "/health");
  const data = await r.json();
  document.getElementById("out").textContent =
    JSON.stringify(data,null,2);
}
  async function extractText() {
  const base = document.getElementById("url").value;
  const text = document.getElementById("inputText").value;

  const r = await fetch(base + "/extract", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
   body: JSON.stringify({
  template: "soap",
  transcript: text
})
  });

  const data = await r.json();
  document.getElementById("out").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
